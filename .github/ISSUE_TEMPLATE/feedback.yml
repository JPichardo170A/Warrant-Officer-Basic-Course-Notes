name: Feedback & Suggestions
description: Share feedback or suggest improvements to the WOBC training materials
title: "[Feedback]: "
labels: ["feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to help improve this repo! Your feedback helps make better training materials for everyone.

  - type: dropdown
    id: type
    attributes:
      label: Feedback Type
      options:
        - Content improvement
        - New topic suggestion
        - Correction or error
        - Additional resources
        - General feedback
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe your feedback or suggestion in detail
      placeholder: What would you like to see changed or added?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any links, references, or examples that support your suggestion
      placeholder: Optional - paste links, screenshots, or examples here
    validations:
      required: false
